<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stop It Counter</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: 'Georgia', serif;
      gap: 2rem;
    }

    #message {
      font-size: clamp(2rem, 8vw, 5rem);
      font-weight: bold;
      color: #e74c3c;
      min-height: 1.2em;
      text-align: center;
      letter-spacing: 0.05em;
      text-shadow: 0 0 20px rgba(231, 76, 60, 0.5);
      transition: transform 0.1s ease;
      word-break: break-all;
    }

    #message.pop {
      transform: scale(1.15);
    }

    #counter {
      font-size: 1rem;
      color: #666;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    button {
      padding: 1rem 3rem;
      font-size: 1.25rem;
      font-family: inherit;
      font-weight: bold;
      letter-spacing: 0.1em;
      background: #e74c3c;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.1s ease;
      text-transform: uppercase;
    }

    button:hover {
      background: #c0392b;
    }

    button:active {
      transform: scale(0.96);
    }

    #reset {
      background: transparent;
      color: #444;
      border: 1px solid #333;
      padding: 0.4rem 1rem;
      font-size: 0.8rem;
      border-radius: 4px;
    }

    #reset:hover {
      color: #888;
      border-color: #555;
      background: transparent;
    }
  </style>
</head>
<body>
  <div id="message"></div>
  <div id="counter"></div>
  <button id="btn">Stop it</button>
  <button id="reset">Reset</button>

  <script>
    let presses = 0;

    const message = document.getElementById('message');
    const counter = document.getElementById('counter');
    const btn = document.getElementById('btn');
    const reset = document.getElementById('reset');

    function buildText(n) {
      // 1 press → "stop it", 2 presses → "stooop it", 3 → "stoooop it", ...
      const oCount = n + 1; // base 2 o's on first press, +1 per extra press
      return 'st' + 'o'.repeat(oCount) + 'p it';
    }

    btn.addEventListener('click', () => {
      presses++;
      message.textContent = buildText(presses);
      counter.textContent = `presses: ${presses}`;

      message.classList.remove('pop');
      // force reflow so the class re-triggers the transition
      void message.offsetWidth;
      message.classList.add('pop');

      setTimeout(() => message.classList.remove('pop'), 150);
    });

    reset.addEventListener('click', () => {
      presses = 0;
      message.textContent = '';
      counter.textContent = '';
    });
  </script>
</body>
</html>
