<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Is Tj Busy?</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <!-- ── Main app ──────────────────────────────────────────────── -->
  <div class="container">
    <header>
      <!-- signed-in user bar — hidden when guest -->
      <div id="user-bar" class="hidden">
        <span id="user-name"></span>
        <div class="user-bar-actions">
          <button id="signout-btn" class="text-btn">Sign out</button>
        </div>
      </div>

      <h1 id="busy-header">IS TJ BUSY?</h1>

      <!-- Unified portrait + circular gauge -->
      <div id="gauge-portrait">
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <clipPath id="portrait-clip">
              <circle cx="100" cy="100" r="76"/>
            </clipPath>
          </defs>
          <!-- Track: 300° arc, gap at bottom -->
          <path id="gauge-track"
            d="M 55,177.9 A 90,90 0 1,1 145,177.9"
            fill="none" stroke-width="8" stroke-linecap="round"
            stroke-dasharray="471.2" stroke-dashoffset="0"/>
          <!-- Fill -->
          <path id="gauge-fill"
            d="M 55,177.9 A 90,90 0 1,1 145,177.9"
            fill="none" stroke-width="8" stroke-linecap="round"
            stroke-dasharray="471.2" stroke-dashoffset="471.2"/>
          <!-- Portrait -->
          <image id="busy-portrait" href="busy-images/notbusy.png"
            x="24" y="24" width="152" height="152"
            clip-path="url(#portrait-clip)"
            preserveAspectRatio="xMidYMin slice"/>

        </svg>
        <div id="busy-level">Calculating...</div>
      </div>
    </header>

    <!-- Only visible when signed in as contributor or owner -->
    <section id="add-task-section" class="card hidden">
      <div class="add-task-label">Add Task</div>
      <div class="input-row">
        <input id="task-input" type="text" placeholder="What needs to be done?" autocomplete="off" />
        <select id="urgency-select">
          <option value="0">Future</option>
          <option value="1">Low</option>
          <option value="2">Medium</option>
          <option value="3" selected>High</option>
          <option value="4">Critical</option>
        </select>
        <button id="add-btn">Add</button>
      </div>
      <div class="input-row deadline-row">
        <input id="deadline-text" type="text" placeholder="Deadline: e.g. May 15, friday, in 3 days (optional)" autocomplete="off" />
        <input id="deadline-picker" type="date" title="Pick a date" />
      </div>
    </section>

    <section class="card task-list">
      <div class="task-list-header">
        <div class="task-list-header-left">
          <span class="task-list-label">Tasks</span>
          <span id="task-count">0</span>
        </div>
        <button id="clear-done-btn" class="hidden">Clear done</button>
      </div>
      <ul id="tasks"></ul>
      <p id="empty-msg" class="empty-msg">
        <span class="free-icon">🌿</span>
        No tasks — Tj is free!
      </p>
    </section>

    <!-- Sign-in footer — visible to guests only -->
    <div id="signin-footer" class="signin-footer">
      <p class="signin-footer-text">Have a UK university or owner account? Sign in to add tasks.</p>
      <div id="signin-wrap"></div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
