<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Is Tj Busy?</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <!-- ── Main app ──────────────────────────────────────────────── -->
  <div class="container">
    <header>
      <!-- signed-in user bar — hidden when guest -->
      <div id="user-bar" class="hidden">
        <span id="user-name"></span>
        <div class="user-bar-actions">
          <button id="owner-btn" class="icon-btn hidden" title="Owner mode">&#x1F512;</button>
          <button id="signout-btn" class="text-btn">Sign out</button>
        </div>
      </div>

      <h1 id="busy-header">IS TJ BUSY?</h1>

      <div id="busy-score-wrapper">
        <div class="gauge-wrap">
          <svg viewBox="0 0 140 80" xmlns="http://www.w3.org/2000/svg">
            <path id="gauge-track"
              d="M 10,75 A 60,60 0 0,1 130,75"
              stroke-dasharray="188.5"
              stroke-dashoffset="0" />
            <path id="gauge-fill"
              d="M 10,75 A 60,60 0 0,1 130,75"
              stroke-dasharray="188.5"
              stroke-dashoffset="188.5" />
          </svg>
          <div id="busy-score">0</div>
        </div>
        <div id="busy-score-label">Busyness Score</div>
        <div id="busy-level">Calculating...</div>
      </div>
    </header>

    <!-- Only visible when signed in as contributor or owner -->
    <section id="add-task-section" class="card hidden">
      <div class="add-task-label">Add Task</div>
      <div class="input-row">
        <input id="task-input" type="text" placeholder="What needs to be done?" autocomplete="off" />
        <select id="urgency-select">
          <option value="0">Future</option>
          <option value="1">Low</option>
          <option value="2">Medium</option>
          <option value="3" selected>High</option>
          <option value="4">Critical</option>
        </select>
        <button id="add-btn">Add</button>
      </div>
    </section>

    <section class="card task-list">
      <div class="task-list-header">
        <div class="task-list-header-left">
          <span class="task-list-label">Tasks</span>
          <span id="task-count">0</span>
        </div>
        <button id="clear-done-btn" class="hidden">Clear done</button>
      </div>
      <ul id="tasks"></ul>
      <p id="empty-msg" class="empty-msg">
        <span class="free-icon">🌿</span>
        No tasks — Tj is free!
      </p>
    </section>

    <!-- Sign-in footer — visible to guests only -->
    <div id="signin-footer" class="signin-footer">
      <p class="signin-footer-text">Have a UoE or owner account? Sign in to add tasks.</p>
      <div id="signin-wrap"></div>
    </div>
  </div>

  <!-- ── PIN modal ─────────────────────────────────────────────── -->
  <div id="pin-modal" class="modal-overlay hidden">
    <div class="modal-card">
      <div class="modal-icon">&#x1F511;</div>
      <h3 class="modal-title">Owner Access</h3>
      <p class="modal-subtitle">Enter your PIN to unlock resolve and clear actions.</p>
      <input id="pin-input" type="password" placeholder="PIN" maxlength="32" autocomplete="off" />
      <p id="pin-error" class="pin-error hidden">Incorrect PIN. Try again.</p>
      <div class="modal-actions">
        <button id="pin-cancel-btn" class="btn-ghost">Cancel</button>
        <button id="pin-submit-btn" class="btn-primary">Unlock</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
