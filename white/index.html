<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>White Noise</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      transition: background 1.2s ease;
      overflow: hidden;
    }

    body.active {
      background: #111;
    }

    /* Ambient glow behind the button */
    .glow-ring {
      position: absolute;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(220,220,255,0.15) 0%, transparent 70%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 1.5s ease;
    }

    body.active .glow-ring {
      opacity: 1;
    }

    /* Main button */
    .noise-btn {
      position: relative;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      outline: none;

      background: radial-gradient(circle at 40% 35%, #e8e8f0, #8888aa);
      box-shadow:
        0 0 0 6px rgba(200,200,240,0.15),
        0 8px 40px rgba(0,0,0,0.6),
        inset 0 2px 6px rgba(255,255,255,0.4),
        inset 0 -4px 10px rgba(0,0,0,0.3);

      transition:
        transform 0.15s ease,
        box-shadow 0.4s ease,
        background 0.6s ease;
    }

    .noise-btn:hover {
      transform: scale(1.03);
    }

    .noise-btn:active {
      transform: scale(0.97);
    }

    /* Pulse ring that appears when active */
    .noise-btn::before {
      content: '';
      position: absolute;
      inset: -16px;
      border-radius: 50%;
      border: 3px solid rgba(200,200,255,0.25);
      opacity: 0;
      transform: scale(0.9);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    body.active .noise-btn::before {
      opacity: 1;
      transform: scale(1);
      animation: pulse-ring 2.5s ease-in-out infinite;
    }

    @keyframes pulse-ring {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      50%       { transform: scale(1.08); opacity: 0.7; }
    }

    /* Peak state: brighter button */
    body.peak .noise-btn {
      background: radial-gradient(circle at 40% 35%, #ffffff, #aaaacc);
      box-shadow:
        0 0 0 8px rgba(220,220,255,0.3),
        0 8px 60px rgba(180,180,255,0.4),
        inset 0 2px 8px rgba(255,255,255,0.6),
        inset 0 -4px 10px rgba(0,0,0,0.2);
    }

    body.peak .glow-ring {
      background: radial-gradient(circle, rgba(220,220,255,0.35) 0%, transparent 70%);
    }

    /* Off state: dim button */
    body.off .noise-btn {
      background: radial-gradient(circle at 40% 35%, #555, #222);
      box-shadow:
        0 4px 20px rgba(0,0,0,0.8),
        inset 0 2px 4px rgba(255,255,255,0.05),
        inset 0 -4px 8px rgba(0,0,0,0.5);
    }

    /* Label inside button */
    .btn-label {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      pointer-events: none;
      user-select: none;
    }

    .btn-icon {
      font-size: 52px;
      line-height: 1;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
    }

    .btn-text {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(30,30,50,0.75);
    }

    /* Volume / status info below button */
    .info {
      margin-top: 36px;
      text-align: center;
      color: rgba(200,200,220,0.5);
      font-size: 13px;
      letter-spacing: 0.08em;
      min-height: 40px;
      transition: color 0.6s ease;
    }

    .info .volume-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .bar-track {
      width: 140px;
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #8888cc, #ccccff);
      border-radius: 2px;
      width: 0%;
      transition: width 0.8s ease;
    }

    .vol-label {
      font-size: 12px;
      min-width: 34px;
      text-align: right;
    }

    .status-line {
      color: rgba(200,200,220,0.4);
      font-size: 12px;
    }

    /* Peak countdown */
    .peak-info {
      margin-top: 18px;
      font-size: 12px;
      color: rgba(180,180,220,0.35);
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body class="off">

  <div class="glow-ring"></div>

  <button class="noise-btn" id="mainBtn" aria-label="Toggle white noise">
    <div class="btn-label">
      <span class="btn-icon" id="btnIcon">○</span>
      <span class="btn-text" id="btnText">Start</span>
    </div>
  </button>

  <div class="info" id="info">
    <div class="volume-bar">
      <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
      <span class="vol-label" id="volLabel">—</span>
    </div>
    <div class="status-line" id="statusLine">Click to begin</div>
  </div>

  <div class="peak-info" id="peakInfo"></div>

<script>
(function () {
  'use strict';

  // ── State machine ──────────────────────────────────────────────
  // States: 'off' → 'gradual' → 'peak' → 'off' → …
  const STATES = ['off', 'gradual', 'peak'];
  let stateIdx = 0;

  const btn        = document.getElementById('mainBtn');
  const btnIcon    = document.getElementById('btnIcon');
  const btnText    = document.getElementById('btnText');
  const barFill    = document.getElementById('barFill');
  const volLabel   = document.getElementById('volLabel');
  const statusLine = document.getElementById('statusLine');
  const peakInfo   = document.getElementById('peakInfo');

  // ── Audio engine ───────────────────────────────────────────────
  let ctx        = null;
  let sourceNode = null;
  let gainNode   = null;
  let volRampId  = null; // requestAnimationFrame id

  const PEAK_VOLUME   = 1.0;
  const RAMP_DURATION = 2.0; // seconds for fade in/out

  function ensureContext() {
    if (!ctx) {
      ctx      = new (window.AudioContext || window.webkitAudioContext)();
      gainNode = ctx.createGain();
      gainNode.gain.value = 0;
      gainNode.connect(ctx.destination);
    }
    if (ctx.state === 'suspended') ctx.resume();
  }

  function startNoise() {
    ensureContext();
    if (sourceNode) return;

    const bufferSize  = 4096;
    const processor   = ctx.createScriptProcessor(bufferSize, 1, 1);
    processor.onaudioprocess = function (e) {
      const out = e.outputBuffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        out[i] = Math.random() * 2 - 1;
      }
    };
    processor.connect(gainNode);
    sourceNode = processor;
  }

  function stopNoise() {
    if (sourceNode) {
      sourceNode.disconnect();
      sourceNode = null;
    }
    if (gainNode) gainNode.gain.value = 0;
    cancelAnimationFrame(volRampId);
  }

  function fadeGainTo(target, duration) {
    if (!gainNode) return;
    gainNode.gain.cancelScheduledValues(ctx.currentTime);
    gainNode.gain.setValueAtTime(gainNode.gain.value, ctx.currentTime);
    gainNode.gain.linearRampToValueAtTime(target, ctx.currentTime + duration);
  }

  // ── Volume scheduling (gradual mode) ──────────────────────────
  // Volume ramps from 0 → 1 linearly from now → 07:00 local time.
  // If it's already past 07:00, treat peak as imminent (full volume).

  function secondsUntilPeak() {
    const now  = new Date();
    const peak = new Date(now);
    peak.setHours(7, 0, 0, 0);
    if (peak <= now) peak.setDate(peak.getDate() + 1); // next day
    return (peak - now) / 1000;
  }

  function targetVolumeNow() {
    const total = secondsUntilPeak();
    // We define "gradual" as: starts at ~0 when very far from peak,
    // reaches 1 exactly at 07:00.  Min shown vol = 0.05.
    const MAX_WINDOW = 8 * 3600; // 8-hour ramp window
    if (total >= MAX_WINDOW) return 0.05;
    const frac = 1 - total / MAX_WINDOW;
    return Math.max(0.05, Math.min(1, frac));
  }

  let gradualRafId = null;

  function startGradualRamp() {
    const secs = secondsUntilPeak();
    const vol  = targetVolumeNow();

    // Fade to current target quickly, then schedule to peak at 07:00
    fadeGainTo(vol, RAMP_DURATION);

    // Continuously schedule gain to 07:00
    gainNode.gain.cancelScheduledValues(ctx.currentTime);
    gainNode.gain.setValueAtTime(gainNode.gain.value, ctx.currentTime);
    gainNode.gain.linearRampToValueAtTime(PEAK_VOLUME, ctx.currentTime + secs);

    updateUI();

    // Update UI every second
    gradualRafId = setInterval(updateUI, 1000);
  }

  function stopGradualRamp() {
    clearInterval(gradualRafId);
  }

  // ── UI helpers ─────────────────────────────────────────────────
  function formatCountdown(secs) {
    if (secs <= 0) return 'now';
    const h = Math.floor(secs / 3600);
    const m = Math.floor((secs % 3600) / 60);
    const s = Math.floor(secs % 60);
    if (h > 0) return `${h}h ${m}m`;
    if (m > 0) return `${m}m ${s}s`;
    return `${s}s`;
  }

  function currentDisplayVolume() {
    if (!gainNode) return 0;
    return gainNode.gain.value;
  }

  function updateUI() {
    const state = STATES[stateIdx];
    const vol   = currentDisplayVolume();
    const pct   = Math.round(vol * 100);

    barFill.style.width = pct + '%';
    volLabel.textContent = pct + '%';

    if (state === 'off') {
      document.body.className = 'off';
      btnIcon.textContent  = '○';
      btnText.textContent  = 'Start';
      barFill.style.width  = '0%';
      volLabel.textContent = '—';
      statusLine.textContent = 'Click to begin';
      peakInfo.textContent   = '';

    } else if (state === 'gradual') {
      // Auto-transition to peak once 7 AM has arrived
      if (secondsUntilPeak() <= 1) {
        transitionTo(STATES.indexOf('peak'));
        return;
      }
      document.body.className = 'active';
      btnIcon.textContent  = '◉';
      btnText.textContent  = 'Peak';
      const secs = secondsUntilPeak();
      statusLine.textContent = 'Gradually rising to 7 am peak';
      peakInfo.textContent   = `Peak in ${formatCountdown(secs)}`;

    } else if (state === 'peak') {
      document.body.className = 'active peak';
      btnIcon.textContent  = '●';
      btnText.textContent  = 'Stop';
      barFill.style.width  = '100%';
      volLabel.textContent = '100%';
      statusLine.textContent = 'Peak white noise';
      peakInfo.textContent   = '';
    }
  }

  // ── State transitions ──────────────────────────────────────────
  function transitionTo(newIdx) {
    stateIdx = newIdx;
    const state = STATES[stateIdx];

    if (state === 'off') {
      stopGradualRamp();
      if (gainNode) {
        gainNode.gain.cancelScheduledValues(ctx.currentTime);
        gainNode.gain.setValueAtTime(gainNode.gain.value, ctx.currentTime);
        gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime + RAMP_DURATION);
      }
      setTimeout(stopNoise, RAMP_DURATION * 1000 + 200);
      updateUI();

    } else if (state === 'gradual') {
      startNoise();
      startGradualRamp();

    } else if (state === 'peak') {
      stopGradualRamp();
      startNoise();
      fadeGainTo(PEAK_VOLUME, RAMP_DURATION);
      // Hold gain at peak indefinitely — no scheduled end
      setTimeout(function () {
        if (gainNode && STATES[stateIdx] === 'peak') {
          gainNode.gain.cancelScheduledValues(ctx.currentTime);
          gainNode.gain.setValueAtTime(PEAK_VOLUME, ctx.currentTime);
        }
      }, (RAMP_DURATION + 0.1) * 1000);
      updateUI();
    }
  }

  btn.addEventListener('click', function () {
    const next = (stateIdx + 1) % STATES.length;
    transitionTo(next);
  });

  // Initial UI draw
  updateUI();
})();
</script>
</body>
</html>
