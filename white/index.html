<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>White Noise</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      transition: background 1.2s ease;
      overflow: hidden;
      gap: 0;
    }

    body.active  { background: #111; }
    body.peak    { background: #131318; }

    .glow-ring {
      position: absolute;
      width: 460px;
      height: 460px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(220,220,255,0.13) 0%, transparent 70%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 1.5s ease;
    }
    body.active .glow-ring { opacity: 1; }

    /* ── Noise type pills ───────────────────────────────────────── */
    .noise-type {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
      z-index: 1;
    }

    .type-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(200,200,220,0.5);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    .type-btn:hover {
      background: rgba(255,255,255,0.1);
      color: rgba(200,200,220,0.8);
    }

    .type-btn.active {
      background: rgba(180,180,255,0.15);
      border-color: rgba(180,180,255,0.4);
      color: rgba(220,220,255,0.9);
    }

    /* colour accent per noise type */
    body.type-white .type-btn.active { border-color: rgba(220,220,255,0.5); background: rgba(200,200,255,0.15); }
    body.type-pink  .type-btn.active { border-color: rgba(255,180,200,0.5); background: rgba(255,160,180,0.12); color: rgba(255,200,215,0.9); }
    body.type-brown .type-btn.active { border-color: rgba(200,150,100,0.5); background: rgba(180,120,70,0.12);  color: rgba(220,180,140,0.9); }

    /* ── Main button ────────────────────────────────────────────── */
    .noise-btn {
      position: relative;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      outline: none;
      z-index: 1;

      background: radial-gradient(circle at 40% 35%, #e8e8f0, #8888aa);
      box-shadow:
        0 0 0 6px rgba(200,200,240,0.12),
        0 8px 40px rgba(0,0,0,0.6),
        inset 0 2px 6px rgba(255,255,255,0.4),
        inset 0 -4px 10px rgba(0,0,0,0.3);
      transition: transform 0.15s ease, box-shadow 0.4s ease, background 0.6s ease;
    }
    .noise-btn:hover  { transform: scale(1.03); }
    .noise-btn:active { transform: scale(0.97); }

    .noise-btn::before {
      content: '';
      position: absolute;
      inset: -16px;
      border-radius: 50%;
      border: 3px solid rgba(200,200,255,0.2);
      opacity: 0;
      transform: scale(0.9);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    body.active .noise-btn::before {
      opacity: 1; transform: scale(1);
      animation: pulse-ring 2.5s ease-in-out infinite;
    }
    @keyframes pulse-ring {
      0%,100% { transform: scale(1);    opacity: 0.25; }
      50%      { transform: scale(1.07); opacity: 0.65; }
    }

    body.peak .noise-btn {
      background: radial-gradient(circle at 40% 35%, #ffffff, #aaaacc);
      box-shadow:
        0 0 0 8px rgba(220,220,255,0.25),
        0 8px 60px rgba(180,180,255,0.35),
        inset 0 2px 8px rgba(255,255,255,0.6),
        inset 0 -4px 10px rgba(0,0,0,0.2);
    }
    body.type-pink.peak .noise-btn {
      background: radial-gradient(circle at 40% 35%, #fff0f4, #cc99aa);
      box-shadow: 0 0 0 8px rgba(255,180,200,0.2), 0 8px 60px rgba(255,150,180,0.25),
        inset 0 2px 8px rgba(255,255,255,0.5), inset 0 -4px 10px rgba(0,0,0,0.2);
    }
    body.type-brown.peak .noise-btn {
      background: radial-gradient(circle at 40% 35%, #f5ece0, #9a7050);
      box-shadow: 0 0 0 8px rgba(200,150,100,0.2), 0 8px 60px rgba(180,120,60,0.25),
        inset 0 2px 8px rgba(255,255,255,0.4), inset 0 -4px 10px rgba(0,0,0,0.25);
    }
    body.off .noise-btn {
      background: radial-gradient(circle at 40% 35%, #555, #222);
      box-shadow: 0 4px 20px rgba(0,0,0,0.8),
        inset 0 2px 4px rgba(255,255,255,0.05), inset 0 -4px 8px rgba(0,0,0,0.5);
    }

    .btn-label {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 6px; pointer-events: none; user-select: none;
    }
    .btn-icon { font-size: 48px; line-height: 1; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4)); }
    .btn-text { font-size: 12px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(30,30,50,0.75); }

    /* ── Volume slider ──────────────────────────────────────────── */
    .volume-control {
      margin-top: 32px;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 12px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }
    .volume-control.visible {
      opacity: 1;
      pointer-events: all;
    }

    .vol-icon { font-size: 14px; color: rgba(200,200,220,0.4); user-select: none; }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 180px;
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.1);
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: rgba(200,200,255,0.85);
      box-shadow: 0 0 6px rgba(180,180,255,0.4);
      cursor: pointer;
      transition: transform 0.15s;
    }
    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
    input[type=range]::-moz-range-thumb {
      width: 16px; height: 16px;
      border-radius: 50%; border: none;
      background: rgba(200,200,255,0.85);
      cursor: pointer;
    }

    .vol-pct {
      font-size: 12px;
      color: rgba(200,200,220,0.45);
      min-width: 34px;
      text-align: right;
      letter-spacing: 0.05em;
    }

    /* ── Status text ────────────────────────────────────────────── */
    .info {
      margin-top: 16px;
      text-align: center;
      z-index: 1;
      min-height: 36px;
    }
    .status-line {
      font-size: 12px;
      color: rgba(200,200,220,0.35);
      letter-spacing: 0.08em;
    }
    .peak-info {
      margin-top: 6px;
      font-size: 12px;
      color: rgba(180,180,220,0.3);
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body class="off type-white">

  <div class="glow-ring"></div>

  <!-- Noise type selector -->
  <div class="noise-type">
    <button class="type-btn active" data-type="white">White</button>
    <button class="type-btn"        data-type="pink">Pink</button>
    <button class="type-btn"        data-type="brown">Brown</button>
  </div>

  <!-- Main toggle button -->
  <button class="noise-btn" id="mainBtn" aria-label="Toggle noise">
    <div class="btn-label">
      <span class="btn-icon" id="btnIcon">○</span>
      <span class="btn-text" id="btnText">Start</span>
    </div>
  </button>

  <!-- Manual volume slider -->
  <div class="volume-control" id="volControl">
    <span class="vol-icon">○</span>
    <input type="range" id="volSlider" min="0" max="100" value="50" />
    <span class="vol-pct" id="volPct">—</span>
  </div>

  <!-- Status -->
  <div class="info">
    <div class="status-line" id="statusLine">Click to begin</div>
    <div class="peak-info"   id="peakInfo"></div>
  </div>

<script>
(function () {
  'use strict';

  // ── State ──────────────────────────────────────────────────────
  const STATES = ['off', 'gradual', 'peak'];
  let stateIdx  = 0;
  let noiseType = 'white'; // 'white' | 'pink' | 'brown'
  let userVolume = 0.5;    // 0–1, manual override during gradual mode
  let gradualOverride = false; // true once user has touched the slider in gradual

  // ── DOM ────────────────────────────────────────────────────────
  const mainBtn    = document.getElementById('mainBtn');
  const btnIcon    = document.getElementById('btnIcon');
  const btnText    = document.getElementById('btnText');
  const volControl = document.getElementById('volControl');
  const volSlider  = document.getElementById('volSlider');
  const volPct     = document.getElementById('volPct');
  const statusLine = document.getElementById('statusLine');
  const peakInfo   = document.getElementById('peakInfo');
  const typeBtns   = document.querySelectorAll('.type-btn');

  // ── Audio ──────────────────────────────────────────────────────
  let ctx        = null;
  let gainNode   = null;
  let sourceNode = null;

  // Pink noise state (Paul Kellet's approximation)
  let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
  // Brown noise state
  let lastBrown = 0;

  const PEAK_VOLUME   = 0.9;
  const RAMP_DURATION = 2.0;

  function ensureContext() {
    if (!ctx) {
      ctx      = new (window.AudioContext || window.webkitAudioContext)();
      gainNode = ctx.createGain();
      gainNode.gain.value = 0;
      gainNode.connect(ctx.destination);
    }
    if (ctx.state === 'suspended') ctx.resume();
  }

  function resetNoiseState() {
    b0=b1=b2=b3=b4=b5=b6=0; lastBrown=0;
  }

  function startNoise() {
    ensureContext();
    if (sourceNode) return;
    resetNoiseState();

    const bufferSize = 4096;
    const processor  = ctx.createScriptProcessor(bufferSize, 1, 1);

    processor.onaudioprocess = function (e) {
      const out = e.outputBuffer.getChannelData(0);
      if (noiseType === 'white') {
        for (let i = 0; i < bufferSize; i++) {
          out[i] = Math.random() * 2 - 1;
        }
      } else if (noiseType === 'pink') {
        // Voss-McCartney / Paul Kellet approximation
        for (let i = 0; i < bufferSize; i++) {
          const w = Math.random() * 2 - 1;
          b0 = 0.99886*b0 + w*0.0555179;
          b1 = 0.99332*b1 + w*0.0750759;
          b2 = 0.96900*b2 + w*0.1538520;
          b3 = 0.86650*b3 + w*0.3104856;
          b4 = 0.55000*b4 + w*0.5329522;
          b5 = -0.7616*b5 - w*0.0168980;
          const pink = (b0+b1+b2+b3+b4+b5+b6 + w*0.5362) * 0.11;
          b6 = w * 0.115926;
          out[i] = pink;
        }
      } else { // brown
        for (let i = 0; i < bufferSize; i++) {
          const w = Math.random() * 2 - 1;
          lastBrown = (lastBrown + 0.02 * w) / 1.02;
          out[i] = lastBrown * 3.5; // amplify to similar perceived level
        }
      }
    };

    processor.connect(gainNode);
    sourceNode = processor;
  }

  function stopNoise() {
    if (sourceNode) { sourceNode.disconnect(); sourceNode = null; }
    if (gainNode)   gainNode.gain.value = 0;
  }

  function restartNoise() {
    if (!sourceNode) return;
    sourceNode.disconnect();
    sourceNode = null;
    resetNoiseState();
    startNoise();
  }

  // ── Gain ↔ slider conversion (squared curve for perceptual linearity) ──
  // slider pos 0-100 → gain 0-1:  gain = (pos/100)²
  // gain 0-1 → slider pos 0-100: pos  = sqrt(gain) * 100
  function sliderToGain(pos) { return Math.pow(pos / 100, 2); }
  function gainToSlider(g)   { return Math.round(Math.sqrt(Math.max(0, g)) * 100); }

  function fadeGainTo(target, duration) {
    if (!gainNode) return;
    const from = Math.max(0.0001, gainNode.gain.value);
    const to   = Math.max(0.0001, target);
    gainNode.gain.cancelScheduledValues(ctx.currentTime);
    gainNode.gain.setValueAtTime(from, ctx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(to, ctx.currentTime + duration);
  }

  function pinGain(value) {
    if (!gainNode) return;
    gainNode.gain.cancelScheduledValues(ctx.currentTime);
    gainNode.gain.setValueAtTime(Math.max(0.0001, value), ctx.currentTime);
  }

  // ── Time helpers ───────────────────────────────────────────────
  function secondsUntilPeak() {
    const now  = new Date();
    const peak = new Date(now);
    peak.setHours(7, 0, 0, 0);
    if (peak <= now) peak.setDate(peak.getDate() + 1);
    return (peak - now) / 1000;
  }

  function targetGradualVolume() {
    if (gradualOverride) return userVolume;
    const MAX_WINDOW = 8 * 3600;
    const secs = secondsUntilPeak();
    if (secs >= MAX_WINDOW) return 0.05;
    return Math.max(0.05, Math.min(PEAK_VOLUME, 1 - secs / MAX_WINDOW));
  }

  // ── Gradual ramp ───────────────────────────────────────────────
  let gradualInterval = null;

  function startGradualRamp() {
    const secs = secondsUntilPeak();

    // Always start from 1% so the onset is whisper-quiet
    gainNode.gain.cancelScheduledValues(ctx.currentTime);
    gainNode.gain.setValueAtTime(0.01, ctx.currentTime);

    if (!gradualOverride) {
      // Exponential ramp: perceptually constant rate of change (dB linear)
      gainNode.gain.exponentialRampToValueAtTime(PEAK_VOLUME, ctx.currentTime + secs);
    }

    updateUI();
    gradualInterval = setInterval(updateUI, 1000);
  }

  function stopGradualRamp() {
    clearInterval(gradualInterval);
    gradualInterval = null;
  }

  // ── UI ─────────────────────────────────────────────────────────
  function formatCountdown(secs) {
    if (secs <= 0) return 'now';
    const h = Math.floor(secs / 3600);
    const m = Math.floor((secs % 3600) / 60);
    const s = Math.floor(secs % 60);
    if (h > 0) return `${h}h ${m}m`;
    if (m > 0) return `${m}m ${s}s`;
    return `${s}s`;
  }

  function updateSliderTrack() {
    const pct = volSlider.value + '%';
    volSlider.style.background =
      `linear-gradient(90deg, rgba(180,180,255,0.6) ${pct}, rgba(255,255,255,0.1) ${pct})`;
  }

  function updateUI() {
    const state = STATES[stateIdx];

    if (state === 'off') {
      document.body.className = `off type-${noiseType}`;
      btnIcon.textContent = '○';
      btnText.textContent = 'Start';
      volControl.classList.remove('visible');
      volPct.textContent  = '—';
      statusLine.textContent = 'Click to begin';
      peakInfo.textContent   = '';

    } else if (state === 'gradual') {
      // Auto-advance to peak when 7 AM arrives
      if (secondsUntilPeak() <= 1) {
        transitionTo(STATES.indexOf('peak'));
        return;
      }
      document.body.className = `active type-${noiseType}`;
      btnIcon.textContent = '◉';
      btnText.textContent = 'Peak';
      volControl.classList.add('visible');

      const currentGain = gradualOverride ? userVolume : (gainNode ? Math.max(0, gainNode.gain.value) : 0.01);
      const sliderPos = gainToSlider(currentGain);
      volSlider.value    = sliderPos;
      volPct.textContent = sliderPos + '%';
      updateSliderTrack();

      statusLine.textContent = gradualOverride
        ? 'Manual volume — auto-ramp paused'
        : 'Gradually rising to 7 am peak';
      peakInfo.textContent = gradualOverride
        ? ''
        : `Peak in ${formatCountdown(secondsUntilPeak())}`;

    } else if (state === 'peak') {
      document.body.className = `active peak type-${noiseType}`;
      btnIcon.textContent = '●';
      btnText.textContent = 'Stop';
      volControl.classList.add('visible');
      const peakSlider = gainNode ? gainToSlider(gainNode.gain.value) : 100;
      volSlider.value    = peakSlider;
      volPct.textContent = peakSlider + '%';
      updateSliderTrack();
      statusLine.textContent = 'Peak — playing until you stop';
      peakInfo.textContent   = '';
    }
  }

  // ── State machine ──────────────────────────────────────────────
  function transitionTo(newIdx) {
    stateIdx = newIdx % STATES.length;
    const state = STATES[stateIdx];

    if (state === 'off') {
      stopGradualRamp();
      gradualOverride = false;
      if (gainNode) {
        gainNode.gain.cancelScheduledValues(ctx.currentTime);
        gainNode.gain.setValueAtTime(gainNode.gain.value, ctx.currentTime);
        gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime + RAMP_DURATION);
      }
      setTimeout(stopNoise, (RAMP_DURATION + 0.2) * 1000);
      updateUI();

    } else if (state === 'gradual') {
      gradualOverride = false;
      startNoise();
      startGradualRamp();

    } else if (state === 'peak') {
      stopGradualRamp();
      startNoise();
      fadeGainTo(PEAK_VOLUME, RAMP_DURATION);
      setTimeout(function () {
        if (STATES[stateIdx] === 'peak') pinGain(PEAK_VOLUME);
      }, (RAMP_DURATION + 0.15) * 1000);
      updateUI();
    }
  }

  // ── Events ─────────────────────────────────────────────────────
  mainBtn.addEventListener('click', function () {
    transitionTo(stateIdx + 1);
  });

  // Noise type pills
  typeBtns.forEach(function (btn) {
    btn.addEventListener('click', function () {
      noiseType = btn.dataset.type;
      typeBtns.forEach(function (b) { b.classList.remove('active'); });
      btn.classList.add('active');
      document.body.className = document.body.className
        .replace(/type-\w+/, 'type-' + noiseType);
      if (sourceNode) restartNoise(); // swap generator on the fly
    });
  });

  // Manual volume slider
  volSlider.addEventListener('input', function () {
    userVolume = sliderToGain(volSlider.value); // squared curve
    volPct.textContent = volSlider.value + '%';
    updateSliderTrack();

    if (STATES[stateIdx] === 'gradual') {
      gradualOverride = true;
      stopGradualRamp();
      pinGain(userVolume);
      statusLine.textContent = 'Manual volume — auto-ramp paused';
      peakInfo.textContent   = '';
    } else if (STATES[stateIdx] === 'peak') {
      pinGain(userVolume);
    }
  });

  // Init slider track
  updateSliderTrack();
  updateUI();
})();
</script>
</body>
</html>
